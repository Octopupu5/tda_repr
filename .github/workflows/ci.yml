name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check tda_repr tools tests

      - name: Run unit tests
        run: |
          pytest tests/test_layers_selection.py tests/test_registry_layers_exist.py

      - name: Build package
        run: |
          python -m build

      - name: Check package metadata
        run: |
          python -m twine check dist/*

